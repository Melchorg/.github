name: markdown to html
description: convert markdown to html using pandoc
inputs:
  input:
    description: 'input markdown file'
    required: true
  output:
    description: 'output html file'
    required: true
  template:
    description: 'html template file'
    required: false
    default: ''
  css:
    description: 'css file to include'
    required: false
    default: ''
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y pandoc
    
    - shell: bash
      run: |
        ARGS=("${{ inputs.input }}" -o "${{ inputs.output }}" --standalone)
        
        if [ -n "${{ inputs.template }}" ]; then
          ARGS+=(--template "${{ inputs.template }}")
        fi
        
        if [ -n "${{ inputs.css }}" ]; then
          ARGS+=(--css "${{ inputs.css }}")
        fi
        
        pandoc "${ARGS[@]}"

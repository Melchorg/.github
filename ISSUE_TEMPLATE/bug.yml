name: bug report
description: report a bug or issue
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        thanks for reporting a bug. please provide details below.
  
  - type: textarea
    id: description
    attributes:
      label: description
      description: what happened?
      placeholder: clear description of the bug
    validations:
      required: true
  
  - type: textarea
    id: reproduction
    attributes:
      label: steps to reproduce
      description: how can we reproduce this?
      placeholder: |
        1. step one
        2. step two
        3. see error
    validations:
      required: true
  
  - type: textarea
    id: expected
    attributes:
      label: expected behavior
      description: what should have happened?
    validations:
      required: true
  
  - type: textarea
    id: environment
    attributes:
      label: environment
      description: relevant version info
      placeholder: |
        - os: 
        - version: 
        - other:
    validations:
      required: false
  
  - type: textarea
    id: context
    attributes:
      label: additional context
      description: anything else relevant?
    validations:
      required: false

name: vscode-extension

on:
  workflow_call:
    inputs:
      release:
        description: 'attach .vsix to GitHub release if triggered by tag'
        required: false
        type: boolean
        default: false

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install vsce
        run: npm install -g @vscode/vsce

      - name: package extension
        run: vsce package --no-dependencies -o "${{ github.event.repository.name }}.vsix"

      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: ${{ github.event.repository.name }}.vsix

      - name: attach to release
        if: ${{ inputs.release && startsWith(github.ref, 'refs/tags/') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} "${{ github.event.repository.name }}.vsix"
        

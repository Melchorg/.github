name: vscode-extension

on:
  workflow_call:
    inputs:
      release:
        description: 'attach .vsix to GitHub release'
        required: false
        type: boolean
        default: false
      release_tag:
        description: 'release tag name'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'release tag name'
        required: false
        type: string

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install vsce
        run: npm install -g @vscode/vsce

      - name: package extension
        run: vsce package --no-dependencies -o "${{ github.event.repository.name }}.vsix"

      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: ${{ github.event.repository.name }}.vsix

      - name: create release
        if: ${{ inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.release_tag || github.ref_name }}"
          if ! gh release view "$TAG" 2>/dev/null; then
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi

      - name: attach to release
        if: ${{ (inputs.release && startsWith(github.ref, 'refs/tags/')) || (inputs.release_tag != '') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ inputs.release_tag || github.ref_name }} "${{ github.event.repository.name }}.vsix"
